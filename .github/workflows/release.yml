name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      # Create the GitHub Release and upload its artifacts.
      contents: write
      # Mint the OIDC token cosign exchanges for a short-lived signing certificate.
      # This is what makes keyless signing possible: no private key exists to leak.
      id-token: write
      # Push the container images to GHCR. The built-in GITHUB_TOKEN can do this against
      # *this* repo's package registry — unlike the Homebrew tap, no PAT is needed.
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          # GoReleaser builds the changelog from the commits since the previous tag,
          # so it needs the whole history, not just the tagged commit.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      # Signing and SBOM generation are separate binaries GoReleaser shells out to.
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      # GoReleaser's `dockers` use buildx to build the per-arch images.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GHCR so GoReleaser can push the images and the manifest. Login
      # must precede GoReleaser — it pushes during `release`, not after.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          # The tag that triggered this run — not whatever `git describe` happens to
          # resolve to. Without this, a commit carrying two tags (v0.1.0 and the
          # v0.1.0-rc1 it was cut from, say) is ambiguous: GoReleaser picked the rc,
          # rebuilt the rc's artifacts, and died uploading them over the ones the rc
          # release already had. The triggering ref is the only thing that is never
          # ambiguous.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          # Creates the release in *this* repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pushes the cask to Joessst-Dev/homebrew-tap. GITHUB_TOKEN cannot do this:
          # it is scoped to this repository only. This must be a PAT with `contents:
          # write` on the tap repo — see README, "Releasing".
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
