version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
    open-pull-requests-limit: 5
    commit-message:
      # Conventional commits: the release changelog groups on these prefixes, and
      # `chore:` is filtered out of it — dependency bumps are not release notes.
      prefix: chore
      include: scope
    groups:
      # One PR for the boring bumps. A patch release of viper does not deserve its
      # own review; a major one does, and majors are deliberately excluded here.
      go-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]
